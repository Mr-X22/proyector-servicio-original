<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Proyección</title>
<style>
html,body{height:100%;margin:0;background:#000;overflow:hidden;cursor:none;}
#stage{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#000;transition:background .3s;}
body.light #stage{background:#fff;}
#content{color:#fff;text-align:center;width:88vw;line-height:1.45;white-space:pre-wrap;text-shadow:0 2px 14px rgba(0,0,0,.5);transition:font-family .2s,font-size .2s,color .2s;}
#content.song{font-size:5.2vw;font-weight:700;}
#content.announcement{font-size:4vw;font-weight:600;}
#content.verse{font-size:4vw;font-weight:500;}
#content .ref{display:block;margin-top:28px;font-size:.45em;opacity:.75;font-weight:500;}
body.light #content{color:#111;text-shadow:none;}
body.light #content .ref{color:#333;}
#imgWrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;display:none;}
#imgWrap img{max-width:100%;max-height:100%;object-fit:contain;}
</style>
</head>
<body>
<div id="stage">
  <div id="content" class="song"></div>
  <div id="imgWrap"><img id="imgEl"/></div>
</div>
<script>
const channel = new BroadcastChannel('proyector-sync');
const content = document.getElementById('content');
const imgWrap = document.getElementById('imgWrap');
const imgEl   = document.getElementById('imgEl');

function render(payload) {
  if (!payload || payload.kind === 'blank') {
    content.style.display = 'none'; imgWrap.style.display = 'none'; return;
  }
  if (payload.kind === 'image') {
    content.style.display = 'none'; imgWrap.style.display = 'flex'; imgEl.src = payload.imageData; return;
  }
  imgWrap.style.display = 'none'; content.style.display = 'block';
  content.className = payload.kind === 'song' ? 'song' : payload.kind === 'verse' ? 'verse' : 'announcement';
  let html = (payload.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  if (payload.reference) html += `<span class="ref">${payload.reference.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span>`;
  content.innerHTML = html;
}

function applySettings(font, size) {
  if (font) content.style.fontFamily = font;
  if (size) content.style.fontSize = size;
}

channel.onmessage = (e) => {
  if (!e.data) return;
  if (e.data.type === 'content') {
    render(e.data.payload);
    if (e.data.font || e.data.size) applySettings(e.data.font, e.data.size);
  }
  if (e.data.type === 'theme') document.body.classList.toggle('light', e.data.theme === 'light');
  if (e.data.type === 'settings') applySettings(e.data.font, e.data.size);
  if (e.data.type === 'ping') channel.postMessage({ type: 'pong' });
};

channel.postMessage({ type: 'request-state' });
document.addEventListener('dblclick', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen().catch(()=>{});
});
</script>
</body>
</html>
