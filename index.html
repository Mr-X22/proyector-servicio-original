<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Proyector de Servicio — Control</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <!-- RAIL -->
  <nav class="rail">
    <div class="rail-logo">P</div>
    <button class="rail-btn active" data-section="canciones" title="Canciones">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Letras
    </button>
    <button class="rail-btn" data-section="anuncios" title="Anuncios">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg>
      Anuncios
    </button>
    <button class="rail-btn" data-section="citas" title="Citas bíblicas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Citas
    </button>
    <button class="rail-btn" data-section="audio" title="Audio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Audio
    </button>
    <div class="rail-spacer"></div>
    <button class="rail-btn" id="btnProjectorWindow" title="Abrir ventana de proyección">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Proyectar
    </button>
    <div class="rail-status" title="Estado de proyección">
      <span class="dot-live" id="dotLive"></span>
    </div>
  </nav>

  <!-- LIBRARY -->
  <section class="library">
    <div class="lib-head">
      <h2 id="libTitle">Letras de canciones</h2>
      <span class="count-pill" id="libCount">0/10</span>
    </div>
    <button class="lib-add" id="btnAdd">+ Agregar nueva</button>
    <input class="lib-search" id="libSearch" placeholder="Buscar..." />
    <div class="lib-list" id="libList"></div>
  </section>

  <!-- EDITOR -->
  <section class="editor" id="editor">
    <div class="editor-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <p>Selecciona un elemento de la lista o agrega uno nuevo.</p>
    </div>
  </section>

  <!-- PREVIEW -->
  <aside class="preview-col">
    <div class="preview-head">
      <h2>Proyección</h2>
      <span class="live-badge" id="liveBadge"><span class="dot-live" id="dotLive2"></span><span id="liveText">SIN SEÑAL</span></span>
    </div>
    <div class="proj-frame" id="projFrame">
      <span class="ph-text" id="projFrameText">Nada en proyección</span>
    </div>
    <div class="slide-nav hidden" id="slideNav">
      <button class="nav-btn" id="btnPrevSlide">‹</button>
      <span class="nav-counter" id="slideCounter">1/1</span>
      <button class="nav-btn" id="btnNextSlide">›</button>
    </div>
    <button class="btn proj-open-btn" id="btnOpenProjector" style="justify-content:center;width:calc(100% - 32px);">Abrir ventana de proyección</button>
    <button class="btn btn-ghost clear-proj" id="btnClearProj" style="justify-content:center;width:calc(100% - 32px);">Limpiar pantalla</button>

    <div class="audio-box">
      <h3>Reproductor de audio</h3>
      <div class="audio-now" id="audioNow">Sin pista seleccionada</div>
      <div class="audio-progress" id="audioProgress" style="cursor:pointer;"><div class="audio-progress-fill" id="audioProgressFill"></div></div>
      <div class="audio-controls" style="margin-top:8px;">
        <button class="nav-btn" id="btnAudioPrev" title="Reiniciar pista actual">↺</button>
        <button class="nav-btn" id="btnAudioPlay">▶</button>
        <button class="nav-btn" id="btnAudioNext">⏭</button>
        <div style="flex:1"></div>
        <button class="icon-btn" id="btnAudioFolder" title="Elegir carpeta de audio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- BOTTOM STRIP: SERVICE LIST -->
  <section class="strip">
    <div class="strip-side">
      <label class="field-label" style="margin:0;">Lista de servicio</label>
      <select id="listSelect"></select>
      <div class="strip-side-btns">
        <button class="btn" id="btnNewList">+ Nueva</button>
        <button class="btn btn-ghost" id="btnDeleteList">Borrar</button>
      </div>
    </div>
    <div class="timeline" id="timeline"></div>
    <div style="display:flex;align-items:center;">
      <button class="btn btn-primary" id="btnAddToList" style="white-space:nowrap;">+ Agregar a la lista</button>
    </div>
  </section>

</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="storage.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
